name: Bump Homebrew Formula

on:
  release:
    types: [published]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          URL="https://github.com/pereljon/claude-mux/archive/refs/tags/${REF_NAME}.tar.gz"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Calculate SHA256
        id: sha
        env:
          TARBALL_URL: ${{ steps.release.outputs.url }}
        run: |
          SHA=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: pereljon/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          NEW_URL: ${{ steps.release.outputs.url }}
          NEW_SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          cd homebrew-tap
          sed -i "s|url \".*\"|url \"$NEW_URL\"|" Formula/claude-mux.rb
          sed -i "s|sha256 \".*\"|sha256 \"$NEW_SHA\"|" Formula/claude-mux.rb

      - name: Commit and push
        env:
          NEW_VERSION: ${{ steps.release.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-mux.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "claude-mux $NEW_VERSION"
          git push
